name: Cleanup stale update branches

on:
  schedule:
    - cron: '0 22 * * *'  # Daily at 22:00 UTC (before upstream check at 00:00)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Close stale update PRs (open > 14 days)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CUTOFF=$(date -d '14 days ago' -u +%Y-%m-%dT%H:%M:%SZ)

          gh pr list --state open --json number,title,createdAt,headRefName \
            --jq ".[] | select(.headRefName | startswith(\"update/ripgrep-\")) | select(.createdAt < \"${CUTOFF}\") | .number" \
          | while read -r PR_NUM; do
            echo "Closing stale PR #${PR_NUM} (open > 14 days)"
            gh pr close "$PR_NUM" \
              --comment "Auto-closed: this update PR has been open for >14 days without merge. A newer check will create a fresh PR if the update is still available." \
              --delete-branch || true
          done

      - name: Delete orphaned update branches (no open PR)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch --prune origin
          BRANCHES=$(git branch -r | grep 'origin/update/ripgrep-' | sed 's|origin/||' || true)
          if [ -z "$BRANCHES" ]; then
            echo "No update branches found"
            exit 0
          fi
          echo "$BRANCHES" | while read -r BRANCH; do
            PR_COUNT=$(gh pr list --state open --head "$BRANCH" --json number --jq 'length')
            if [ "$PR_COUNT" = "0" ]; then
              echo "Deleting orphaned branch: $BRANCH"
              git push origin --delete "$BRANCH" || true
            fi
          done
