name: Check upstream ripgrep

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-update:
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.check.outputs.updated }}
      new_version: ${{ steps.check.outputs.new_version }}
      current_version: ${{ steps.check.outputs.current_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: DeterminateSystems/nix-installer-action@d96bc962e61b3049ce8128d03d57a1144fa96539

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for updates
        id: check
        run: bash scripts/check-ripgrep-updates.sh
        timeout-minutes: 30

      - name: Check for changes
        id: changes
        if: steps.check.outputs.updated == 'true'
        run: |
          if git diff --quiet package.nix; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Close superseded PRs
        if: steps.check.outputs.updated == 'true' && steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr list --state open --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("update/ripgrep-")) | .number' \
          | while read -r PR_NUM; do
            echo "Closing superseded PR #${PR_NUM}"
            gh pr close "$PR_NUM" --comment "Superseded by newer upstream release." --delete-branch || true
          done

      - name: Create pull request
        if: steps.check.outputs.updated == 'true' && steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NEW_VERSION="${{ steps.check.outputs.new_version }}"
          CURRENT_VERSION="${{ steps.check.outputs.current_version }}"
          BRANCH="update/ripgrep-${NEW_VERSION}"

          git checkout -b "$BRANCH"
          git add package.nix flake.lock README.md
          git commit -m "chore: update ripgrep to ${NEW_VERSION}"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "chore: update ripgrep to ${NEW_VERSION}" \
            --body "## Automated Update

          **Before:** ${CURRENT_VERSION}
          **After:** ${NEW_VERSION}

          ### Verification Checklist
          - [x] Source hash updated
          - [x] Cargo hash updated
          - [x] Flake validation passed
          - [x] Test build succeeded
          - [x] Binary verification passed (rg --version)
          - [ ] Manual review

          [Release notes](https://github.com/BurntSushi/ripgrep/releases/tag/${NEW_VERSION})"

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4
        with:
          name: build-logs
          path: /tmp/nix-build-*.log
          retention-days: 7
